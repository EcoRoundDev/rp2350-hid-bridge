name: Build Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for git SHA and tags

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libusb-1.0-0-dev libudev-dev

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        # Don't override RUSTFLAGS — .cargo/config.toml defines critical linker script flags
        # (-Tlink.x, -Tdefmt.x) that must not be replaced
        rustflags: ""

    - name: Install elf2uf2-rs
      run: |
        cargo install --git https://github.com/JoNil/elf2uf2-rs

    - name: Build firmware
      run: |
        cargo build --release

    - name: Get version and commit hash
      id: meta
      run: |
        # Extract version from Cargo.toml
        VERSION=$(grep -m 1 '^version =' Cargo.toml | cut -d '"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        # Get short commit SHA
        SHA_SHORT=$(git rev-parse --short HEAD)
        echo "sha=$SHA_SHORT" >> $GITHUB_OUTPUT

    - name: Convert ELF to UF2 and Rename
      run: |
        VERSION="${{ steps.meta.outputs.version }}"
        SHA="${{ steps.meta.outputs.sha }}"
        ELF=target/thumbv8m.main-none-eabihf/release/rp2350-hid-bridge
        OUT_BASE=target/thumbv8m.main-none-eabihf/release/rp2350-hid-bridge-v$VERSION-$SHA
        
        # Copy ELF with versioned name
        cp $ELF $OUT_BASE.elf
        
        # Convert ELF to UF2 using new subcommand syntax, output directly with versioned name
        elf2uf2-rs convert -f rp2350-arm-s $ELF $OUT_BASE.uf2

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rp2350-hid-bridge-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.sha }}
        path: |
          target/thumbv8m.main-none-eabihf/release/rp2350-hid-bridge-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.sha }}.elf
          target/thumbv8m.main-none-eabihf/release/rp2350-hid-bridge-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.sha }}.uf2
